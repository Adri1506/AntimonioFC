        - heading "AntimonioFC ficha a promesa argentina Ignacio Palma" [level=1] [ref=e312]
        - generic [ref=e313]:
          - generic [ref=e314]:
            - img [ref=e315]
            - text: 14 de julio de 2026
          - generic [ref=e317]: Extraído de El Deportivo
        - generic [ref=e318]:
          - paragraph [ref=e319]: En un movimiento que ilusiona a la hinchada, Club Deportivo AntimonioFC anunció el fichaje de Ignacio Palma, mediocampista ofensivo de 24 años proveniente de River Plate. El jugador argentino llega con el pase en su poder tras finalizar su contrato con el club millonario.
          - paragraph [ref=e320]: Palma, quien puede desempeñarse como mediocampista central o volante ofensivo, firmó un contrato por tres temporadas con opción a una cuarta. "Estoy muy feliz de llegar a AntimonioFC. Es un club con mucha historia y una hinchada increíble. Voy a dar todo por esta camiseta", declaró el jugador en su presentación.
          - paragraph [ref=e321]: "El técnico Eduardo Zamorano destacó la versatilidad del nuevo refuerzo: \"Ignacio es un jugador con gran visión de juego y llegada al arco. Nos dará muchas opciones en el mediocampo y estamos seguros de que se adaptará rápidamente al fútbol chileno\"."
          - paragraph [ref=e322]: Con esta incorporación, AntimonioFC suma su tercer refuerzo para la temporada 2026, buscando consolidarse en los puestos de avanzada del Campeonato Nacional.
